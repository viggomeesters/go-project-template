name: Linux stack pairing

on:
  push:
  pull_request:

jobs:
  pairing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout template
        uses: actions/checkout@v4
        with:
          path: go-project-template
      - name: Checkout stack
        uses: actions/checkout@v4
        with:
          repository: viggomeesters/go-workflow-stack
          path: go-workflow-stack
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Pairing check
        working-directory: go-project-template
        run: GO_STACK="$GITHUB_WORKSPACE/go-workflow-stack" make check
      - name: WSL/Hermes doctor contract
        working-directory: go-project-template
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          printf '#!/usr/bin/env bash\nexit 0\n' > "$RUNNER_TEMP/bin/hermes"
          chmod +x "$RUNNER_TEMP/bin/hermes"
          PATH="$RUNNER_TEMP/bin:$PATH" GO_STACK="$GITHUB_WORKSPACE/go-workflow-stack" ./go doctor . --platform wsl --agent hermes --json
